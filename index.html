<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>__AGENT_NAME__ · deepagents</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0; height: 100vh; display: flex; flex-direction: column;
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
      background: #0d1117; color: #e6edf3;
    }
    header {
      padding: 12px 16px; border-bottom: 1px solid #21262d;
      display: flex; align-items: center; gap: 12px;
    }
    header .name { font-weight: 600; font-size: 15px; }
    header .sub { color: #7d8590; font-weight: 400; font-size: 13px; }
    header .spacer { flex: 1; }
    .badge {
      font-size: 12px; padding: 3px 10px; border-radius: 999px;
      text-transform: uppercase; letter-spacing: .04em; font-weight: 600;
      background: #30363d; color: #adbac7;
    }
    .badge.running { background: #1f6f3f; color: #aff5c8; }
    .badge.interrupted { background: #7a5d00; color: #ffe08a; }
    .badge.completed { background: #1f4d7a; color: #add2ff; }
    .badge.error { background: #6e2330; color: #ffb3bd; }
    button {
      padding: 6px 14px; border-radius: 8px; border: 1px solid #30363d;
      background: #21262d; color: #e6edf3; font: inherit; font-size: 13px;
      font-weight: 600; cursor: pointer;
    }
    button:hover { border-color: #8b949e; }
    button.approve { background: #238636; border-color: #238636; color: #fff; }
    button.reject { background: #6e2330; border-color: #6e2330; color: #fff; }
    button:disabled { opacity: .5; cursor: default; }
    #log { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 10px; }
    .row { max-width: 860px; width: 100%; margin: 0 auto; }
    .assistant { white-space: pre-wrap; word-break: break-word; line-height: 1.55; color: #c9d1d9; }
    .tool { color: #d29922; font-size: 13px; font-family: ui-monospace, monospace; }
    .tool-result { color: #6e7681; font-size: 12px; font-family: ui-monospace, monospace; white-space: pre-wrap; }
    .note { color: #7d8590; font-size: 12px; font-style: italic; }
    .err { color: #ff9492; white-space: pre-wrap; }
    .approval {
      max-width: 860px; width: 100%; margin: 4px auto; padding: 14px;
      border: 1px solid #7a5d00; border-radius: 10px; background: #1a1700;
    }
    .approval h3 { margin: 0 0 8px; font-size: 14px; color: #ffe08a; }
    .approval pre {
      margin: 6px 0; padding: 8px; background: #0d1117; border-radius: 6px;
      font-size: 12px; overflow-x: auto; color: #adbac7;
    }
    .approval .actions { display: flex; gap: 8px; margin-top: 10px; }
    .approval input {
      flex: 1; padding: 6px 10px; border-radius: 6px; border: 1px solid #30363d;
      background: #0d1117; color: #e6edf3; font: inherit; font-size: 13px;
    }
  </style>
</head>
<body>
  <header>
    <span class="name">__AGENT_NAME__</span>
    <span class="sub">deepagents runtime</span>
    <span class="spacer"></span>
    <span id="status" class="badge">connecting</span>
    <button id="restart">Restart</button>
  </header>
  <div id="log"></div>

  <script>
    const log = document.getElementById('log');
    const statusEl = document.getElementById('status');
    const restartBtn = document.getElementById('restart');
    let seen = -1;
    let current = null; // current assistant text row being appended to

    function setStatus(s) {
      statusEl.textContent = s;
      statusEl.className = 'badge ' + s;
    }
    function row(cls, text) {
      const d = document.createElement('div');
      d.className = 'row ' + cls;
      if (text !== undefined) d.textContent = text;
      log.append(d);
      log.scrollTop = log.scrollHeight;
      return d;
    }
    function note(text) { row('note', text); }

    function renderInterrupt(ev) {
      const req = ev.request || {};
      const actions = req.action_requests || [];
      const card = document.createElement('div');
      card.className = 'approval';
      const h = document.createElement('h3');
      h.textContent = '⏸ Approval required';
      card.append(h);
      actions.forEach((a) => {
        const p = document.createElement('pre');
        p.textContent = a.name + '(' + JSON.stringify(a.args || {}, null, 2) + ')'
          + (a.description ? '\n\n' + a.description : '');
        card.append(p);
      });
      const wrap = document.createElement('div');
      wrap.className = 'actions';
      const msg = document.createElement('input');
      msg.placeholder = 'optional reason (sent to the agent on reject)';
      const approve = document.createElement('button');
      approve.className = 'approve'; approve.textContent = 'Approve';
      const reject = document.createElement('button');
      reject.className = 'reject'; reject.textContent = 'Reject';
      const decide = async (type) => {
        approve.disabled = reject.disabled = true;
        const decisions = actions.map(() =>
          type === 'reject' && msg.value.trim()
            ? { type: 'reject', message: msg.value.trim() }
            : { type });
        await fetch('/resume', {
          method: 'POST', headers: { 'content-type': 'application/json' },
          body: JSON.stringify({ decisions }),
        });
        card.querySelector('.actions').replaceWith(
          Object.assign(document.createElement('div'),
            { className: 'note', textContent: type === 'approve' ? '✓ approved' : '✗ rejected' }));
      };
      approve.onclick = () => decide('approve');
      reject.onclick = () => decide('reject');
      wrap.append(approve, reject, msg);
      card.append(wrap);
      log.append(card);
      log.scrollTop = log.scrollHeight;
    }

    function handle(ev) {
      if (typeof ev.seq === 'number') { if (ev.seq <= seen) return; seen = ev.seq; }
      switch (ev.type) {
        case 'status': setStatus(ev.status); if (ev.error) row('err', '[' + ev.status + '] ' + ev.error); break;
        case 'token':
          if (!current) current = row('assistant', '');
          current.textContent += ev.text; log.scrollTop = log.scrollHeight; break;
        case 'tool_call': current = null; row('tool', '⚙ ' + ev.name + '…'); break;
        case 'tool_result': current = null; row('tool-result', '↳ ' + (ev.name || 'tool') + (ev.text ? ': ' + ev.text : '')); break;
        case 'interrupt': current = null; renderInterrupt(ev); break;
        case 'restart': current = null; log.innerHTML = ''; note('— restarted —'); break;
        case 'error': current = null; row('err', ev.error); break;
      }
    }

    function connect() {
      const es = new EventSource('/events');
      es.onmessage = (e) => { try { handle(JSON.parse(e.data)); } catch (_) {} };
      es.onerror = () => { /* EventSource auto-reconnects; backlog dedup via seq */ };
    }

    restartBtn.onclick = async () => {
      restartBtn.disabled = true;
      await fetch('/restart', { method: 'POST' });
      setTimeout(() => { restartBtn.disabled = false; }, 500);
    };

    connect();
  </script>
</body>
</html>
