# deepagents LanguageAgentRuntime — a cluster-scoped runtime preset.
# Requires the language-operator chart (which provides the LanguageAgentRuntime
# CRD) to be installed first.

# Single combined image built by this repo. Unlike the CLI-wrapping runtimes there
# is no init container: server.py reads /etc/agent/config.yaml directly at startup
# and serves the deepagents agent over FastAPI.
image:
  repository: ghcr.io/language-operator/deepagents-adapter
  tag: 0.1.2
  pullPolicy: ""

# Agents using this runtime sit behind the cluster OIDC proxy (when the cluster
# enables auth). All LLM traffic routes through the injected MODEL_ENDPOINT
# gateway, so the agent never holds real provider keys.
auth:
  enabled: true

# HTTP port the FastAPI server listens on (/health probe, / live UI, /events
# SSE, /state, /resume, /restart). A2A (when enabled) shares this same port:
# GET /.well-known/agent-card.json + JSON-RPC at POST /.
port: 8080

# A2A (Agent2Agent) is additive and off by default — set via the LanguageAgent's
# env (operator-injected), not here. Reference:
#   A2A_MODE=server   Request-driven: serve an Agent Card + JSON-RPC
#                     (message/send, tasks/get) and DO NOT auto-run instructions.
#                     Each request runs the agent on a fresh thread (HITL disabled).
#   A2A_SKILLS        Comma-separated skill ids advertised on the card (server mode).
#                     Richer skills (name/description/tags) come from a config.yaml
#                     `a2a.skills:` block.
#   A2A_PUBLIC_URL    Override the card's advertised url (default: the in-cluster
#                     service address http://<name>.<ns>.svc.cluster.local:<port>).
#   A2A_PEERS         Comma-separated peer base URLs. The autonomous agent gains a
#                     `delegate_to_<peer>` tool per peer (alongside its MCP tools).
#                     Peers may also come from a config.yaml `peers:` block.
# With none of these set, behavior is unchanged (autonomous single run).

resources:
  requests:
    memory: 512Mi
    cpu: 250m
  limits:
    memory: 2Gi
    cpu: 1000m
